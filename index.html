
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Forza 22</title>
    <meta name="application-name" content="Forza 22">
    <meta name="apple-mobile-web-app-title" content="Forza 22">
    <!-- Favicon dinámico -->
    <link rel="icon" type="image/jpeg" href="https://i.ibb.co/YFGy2wjg/a8933dc7cb4d97e76826bcf7a9169945-0-1776164238-1967.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="https://i.ibb.co/YFGy2wjg/a8933dc7cb4d97e76826bcf7a9169945-0-1776164238-1967.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Registro de Service Worker para PWA y Notificaciones -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then(reg => console.log('SW: Registrado correctamente', reg.scope))
            .catch(err => console.error('SW: Error al registrar', err));
        });
      }

      // Detector de errores globales para capturar fallos de carga de assets (404 / Chunk Error)
      window.addEventListener('error', function(e) {
        // 1. Detectar errores en tags script/link (e.target es el elemento)
        const isElementError = e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK');
        
        // 2. Detectar errores de ejecución de chunks (e.message existe y contiene keywords)
        const isChunkError = e.message && (
          e.message.includes('ChunkLoadError') || 
          e.message.includes('Loading chunk') || 
          e.message.includes('Failed to fetch dynamically imported module') ||
          e.message.includes('Unexpected token \'<\'') // Típico cuando el servidor devuelve index.html (404 fallback) en vez de JS
        );
        
        if (isElementError || isChunkError) {
          console.error("🚀 [Error Recovery] Fallo crítico al cargar un recurso:", e);
          
          // Verificar si ya intentamos recargar recientemente para evitar loops
          const lastReload = sessionStorage.getItem('last_asset_reload');
          const now = Date.now();
          if (!lastReload || now - parseInt(lastReload) > 10000) {
            sessionStorage.setItem('last_asset_reload', now.toString());
            console.warn("🔄 [Error Recovery] Detectado error de asset. Intentando recarga forzada...");
            
            // Intentar limpiar cachés de SW antes de recargar
            if (navigator.serviceWorker && navigator.serviceWorker.controller) {
              navigator.serviceWorker.controller.postMessage({ action: 'skipWaiting' });
            }
            
            setTimeout(() => {
              window.location.reload(true);
            }, 500);
            return;
          }

          // Si ya recargamos y sigue fallando, mostrar mensaje
          const root = document.getElementById('root');
          if (root) {
             root.innerHTML = `
              <div style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px; font-family: sans-serif; background:#f8fafc; position:fixed; inset:0; z-index:9999;">
                <div style="color:#ef4444; margin-bottom:20px;">
                  <svg width="60" height="60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                </div>
                <h1 style="font-size:24px; color:#1e293b; margin-bottom:8px;">Error de Versión</h1>
                <p style="color:#64748b; max-width:400px; line-height:1.5;">La aplicación se ha actualizado. Por favor, limpie la caché de su navegador o use una ventana de incógnito si el error persiste.</p>
                <button onclick="window.location.reload(true)" style="margin-top:20px; padding:12px 24px; background:#2563eb; color:white; border:none; border-radius:8px; font-weight:600; cursor:pointer; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);">
                  Forzar Recarga
                </button>
              </div>
             `;
          }
        }
      }, true); // UseCapture para errores de red en tags script/link
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- PUNTO DE ENTRADA CRÍTICO -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
